# ============================================================
# Stellenistberechnung – Production Deployment
# ============================================================
# Pattern: wie Kassenbuch (db + app + Caddy via reverse_proxy)
# Unterschied: Next.js Full-Stack statt separatem Frontend/Backend
#
# Starten: docker compose -f docker-compose.prod.yml up -d --build
# Logs:    docker compose -f docker-compose.prod.yml logs -f app
# Seed:    docker compose -f docker-compose.prod.yml exec app node seed.mjs
# ============================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stellenist-app
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://stellenist:${DB_PASSWORD}@db:5432/stellenistberechnung
      - SESSION_SECRET=${SESSION_SECRET}
      - API_SYNC_KEY=${API_SYNC_KEY}
      - NODE_ENV=production
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - reverse_proxy
      - internal

  db:
    image: postgres:16-alpine
    container_name: stellenist-db
    restart: unless-stopped
    volumes:
      - stellenist_data:/var/lib/postgresql/data
      - ./backups:/backups
    environment:
      POSTGRES_DB: stellenistberechnung
      POSTGRES_USER: stellenist
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stellenist -d stellenistberechnung"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    # Kein Port-Exposure — nur aus dem app-Container erreichbar

volumes:
  stellenist_data:

networks:
  reverse_proxy:
    external: true
  internal:
    internal: true
