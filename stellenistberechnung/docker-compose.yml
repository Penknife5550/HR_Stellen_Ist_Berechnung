services:
  postgres:
    image: postgres:16-alpine
    container_name: stellenist-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: stellenistberechnung
      POSTGRES_USER: stellenist
      POSTGRES_PASSWORD: stellenist_local_2026
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
